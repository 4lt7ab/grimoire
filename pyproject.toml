[tool.uv.workspace]
members = ["packages/*"]

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "pytest-cov>=6",
    "ruff>=0.8",
    "fastembed>=0.4",
    "socksio>=1.0",
    "mypy>=2.1.0",
]

[tool.ruff]
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM"]

[tool.mypy]
python_version = "3.12"
strict = true
files = ["packages/grimoire/src", "packages/grimoire-cli/src"]

[[tool.mypy.overrides]]
module = ["sqlite_vec", "fastembed.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
addopts = ["--import-mode=importlib", "-m", "not integration"]
asyncio_mode = "auto"
markers = [
    "integration: exercises the real FastembedEmbedder; network-gated, deselected by default",
]
testpaths = [
    "packages/grimoire/tests",
    "packages/grimoire-cli/tests",
]

[tool.coverage.run]
source = ["grimoire", "grimoire_cli"]

[tool.coverage.report]
show_missing = true
